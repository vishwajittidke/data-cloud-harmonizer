<template>
    <lightning-card icon-name="custom:custom64" class="slds-card_boundary">
        <div slot="title" class="slds-text-heading_medium slds-text-color_success" style="font-weight: 700;">
            Data Cloud: Identity Resolution Engine
        </div>
        
        <div slot="actions">
            <lightning-button label="Reset Demo" variant="destructive-text" onclick={handleReset} class="slds-m-right_x-small"></lightning-button>
            <lightning-button label="Inject Messy Data" variant="success" onclick={handleInjectData} class="slds-m-right_medium"></lightning-button>
        </div>

        <div class="slds-p-around_medium slds-theme_default">
            
            <!-- ONBOARDING PROGRESS INDICATOR -->
            <div class="slds-m-bottom_large slds-p-horizontal_medium slds-m-top_medium">
                <lightning-progress-indicator current-step={activeTab} type="path" variant="base">
                    <lightning-progress-step label="1. Inspect Raw Silos" value="raw"></lightning-progress-step>
                    <lightning-progress-step label="2. View Golden Records" value="golden"></lightning-progress-step>
                    <lightning-progress-step label="3. Manual Resolution" value="queue"></lightning-progress-step>
                </lightning-progress-indicator>
            </div>

            <lightning-tabset active-tab-value={activeTab}>
                <lightning-tab label="Step 1: Raw Data Sources" value="raw" onactive={handleTabChange}>
                    <div class="slds-m-top_small slds-p-around_medium slds-box slds-theme_shade">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                            <h2 class="slds-text-heading_small slds-text-color_error">
                                <lightning-icon icon-name="utility:warning" size="small" class="slds-m-right_x-small"></lightning-icon>
                                Fragmented Data Silos
                            </h2>
                            <lightning-button label="Inject Messy Data" variant="success" onclick={handleInjectData}></lightning-button>
                        </div>
                        
                        <template if:false={hasRawData}>
                            <div class="slds-p-around_xx-large slds-text-align_center">
                                <lightning-icon icon-name="utility:database" size="large" class="slds-m-bottom_small" variant="warning"></lightning-icon>
                                <h3 class="slds-text-heading_medium slds-m-bottom_small">Silos are currently empty</h3>
                                <p class="slds-text-color_weak">Click "Inject Messy Data" to populate the system with fragmented records.</p>
                            </div>
                        </template>

                        <template if:true={hasRawData}>
                            <div class="slds-grid slds-gutters">
                                <div class="slds-col slds-size_1-of-2">
                                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Email Marketing Tool (Subscribers)</h3>
                                    <div class="scrollable-container slds-m-bottom_large">
                                        <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table">
                                        <thead>
                                            <tr><th>Name</th><th>Email</th><th>Golden Record</th></tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={subscribers} for:item="sub">
                                                <tr key={sub.Id}>
                                                    <td>{sub.Full_Name__c}</td>
                                                    <td>{sub.Email_Address__c}</td>
                                                    <td>
                                                        <template if:true={sub.Unified_Individual__c}>
                                                            <lightning-badge label="Linked" icon-name="utility:check" class="slds-theme_success"></lightning-badge>
                                                            <lightning-button-icon icon-name="utility:unlink" alternative-text="Unlink from Golden Record" title="Unlink" onclick={handleUnmerge} data-id={sub.Id} data-type="Subscriber" class="slds-m-left_x-small"></lightning-button-icon>
                                                        </template>
                                                        <template if:false={sub.Unified_Individual__c}>
                                                            <lightning-badge label="Unlinked" class="slds-theme_error"></lightning-badge>
                                                        </template>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                        </table>
                                    </div>
                                </div>
                                <div class="slds-col slds-size_1-of-2">
                                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">In-Store POS System (Transactions)</h3>
                                    <div class="scrollable-container">
                                        <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table">
                                        <thead>
                                            <tr><th>Customer</th><th>Phone</th><th>Spend</th><th>Golden Record</th></tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={posRecords} for:item="pos">
                                                <tr key={pos.Id}>
                                                    <td>{pos.Customer_Name__c}</td>
                                                    <td>{pos.Phone_Number__c}</td>
                                                    <td>${pos.Total_Spent__c}</td>
                                                    <td>
                                                        <template if:true={pos.Unified_Individual__c}>
                                                            <lightning-badge label="Linked" icon-name="utility:check" class="slds-theme_success"></lightning-badge>
                                                            <lightning-button-icon icon-name="utility:unlink" alternative-text="Unlink from Golden Record" title="Unlink" onclick={handleUnmerge} data-id={pos.Id} data-type="POS" class="slds-m-left_x-small"></lightning-button-icon>
                                                        </template>
                                                        <template if:false={pos.Unified_Individual__c}>
                                                            <lightning-badge label="Unlinked" class="slds-theme_error"></lightning-badge>
                                                        </template>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                </lightning-tab>

                <!-- TAB 2: GOLDEN RECORDS -->
                <lightning-tab label="Step 2: Golden Records" value="golden" onactive={handleTabChange}>
                    <div class="slds-m-top_small slds-p-around_medium slds-box" style="border: 2px solid #0176d3; background-color: #f4f6f9;">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                            <h2 class="slds-text-heading_small slds-text-color_default" style="color: #0176d3; font-weight: bold;">
                                <lightning-icon icon-name="utility:merge" size="small" class="slds-m-right_x-small"></lightning-icon>
                                Unified Customer 360 (Golden Records)
                            </h2>
                            <lightning-button label="Run Harmonization" variant="brand" onclick={handleRunHarmonization} disabled={isProcessing}></lightning-button>
                        </div>
                        
                        <template if:true={isProcessing}>
                            <div class="slds-p-around_xx-large slds-text-align_center">
                                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                                <p class="slds-m-top_large slds-text-heading_small slds-text-color_weak">{progressMessage}</p>
                                <template if:true={showProgressBar}>
                                    <div class="slds-m-top_medium slds-p-horizontal_large">
                                        <lightning-progress-bar value={progressPercent} size="large" variant="circular"></lightning-progress-bar>
                                    </div>
                                </template>
                            </div>
                        </template>
                        
                        <template if:false={isProcessing}>
                            <template if:true={hasUnifiedData}>
                                <div class="scrollable-container">
                                    <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table golden-table">
                                    <thead>
                                        <tr>
                                            <th>First Name</th>
                                            <th>Primary Email</th>
                                            <th>Primary Phone</th>
                                            <th>Match Confidence</th>
                                            <th>Lifetime Value</th>
                                            <th>Lineage</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <template for:each={unifiedRecords} for:item="uni">
                                            <tr key={uni.Id}>
                                                <td class="slds-text-heading_small">
                                                    <lightning-icon icon-name="standard:user" size="small" class="slds-m-right_x-small"></lightning-icon>
                                                    {uni.First_Name__c}
                                                </td>
                                                <td>{uni.Primary_Email__c}</td>
                                                <td>{uni.Primary_Phone__c}</td>
                                                <td>
                                                    <span class="slds-badge slds-theme_success">
                                                        <lightning-icon icon-name="utility:graph" size="xx-small" class="slds-m-right_xx-small" variant="inverse"></lightning-icon>
                                                        {uni.Confidence_Score__c}%
                                                    </span>
                                                </td>
                                                <td class="slds-text-color_success" style="font-weight:bold;">${uni.Total_Lifetime_Value__c}</td>
                                                <td>
                                                    <lightning-button-icon icon-name="utility:graph" alternative-text="View Lineage Graph" title="View Lineage Graph" onclick={handleOpenGraph} data-id={uni.Id}></lightning-button-icon>
                                                    <lightning-button-icon icon-name="utility:magicwand" alternative-text="Agentforce Insights" title="Agentforce Insights" onclick={handleAIInsights} data-id={uni.Id} variant="brand" class="slds-m-left_x-small"></lightning-button-icon>
                                                </td>
                                            </tr>
                                        </template>
                                    </tbody>
                                    </table>
                                </div>
                            </template>
                            
                            <template if:false={hasUnifiedData}>
                                <div class="slds-p-around_xx-large slds-text-align_center">
                                    <lightning-icon icon-name="utility:magicwand" size="large" class="slds-m-bottom_small" style="--sds-c-icon-color-foreground-default: #0176d3;"></lightning-icon>
                                    <h3 class="slds-text-heading_medium slds-m-bottom_small">No Unified Records</h3>
                                    <p class="slds-text-color_weak">Click "Run Harmonization" to stitch the fragmented silos together.</p>
                                </div>
                            </template>
                        </template>
                    </div>
                </lightning-tab>

                <!-- TAB 3: RESOLUTION QUEUE -->
                <lightning-tab label="Step 3: Resolution Queue (Manual Merge)" value="queue" onactive={handleTabChange}>
                    <div class="slds-m-top_small">
                        <div class="slds-grid slds-grid_align-spread slds-m-bottom_medium">
                            <h2 class="slds-text-heading_small slds-text-color_default" style="font-weight: bold;">
                                <lightning-icon icon-name="utility:slider" size="small" class="slds-m-right_x-small"></lightning-icon>
                                Manual Resolution Queue
                            </h2>
                            <lightning-button label="Refresh Queue" variant="neutral" icon-name="utility:refresh" onclick={handleRefreshQueue}></lightning-button>
                        </div>
                        
                        <template if:true={isQueueLoading}>
                            <lightning-spinner alternative-text="Loading Queue" size="medium"></lightning-spinner>
                        </template>

                        <div class="slds-grid slds-gutters">
                            <!-- Unlinked Subscribers -->
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-box slds-theme_shade">
                                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Unlinked Subscribers</h3>
                                    <div class="scrollable-container">
                                        <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table">
                                        <thead>
                                            <tr><th>Name</th><th>Email</th><th>Action</th></tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={unlinkedSubscribers} for:item="sub">
                                                <tr key={sub.Id}>
                                                    <td>{sub.Full_Name__c}</td>
                                                    <td>{sub.Email_Address__c}</td>
                                                    <td>
                                                        <lightning-button-icon icon-name="utility:link" alternative-text="Merge to Golden Record" title="Merge to Golden Record" onclick={handleOpenMergeModal} data-id={sub.Id} data-type="Subscriber"></lightning-button-icon>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>

                            <!-- Unlinked POS -->
                            <div class="slds-col slds-size_1-of-2">
                                <div class="slds-box slds-theme_shade">
                                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Unlinked POS Transactions</h3>
                                    <div class="scrollable-container">
                                        <table class="slds-table slds-table_cell-buffer slds-table_bordered custom-table">
                                        <thead>
                                            <tr><th>Customer</th><th>Phone</th><th>Action</th></tr>
                                        </thead>
                                        <tbody>
                                            <template for:each={unlinkedPOS} for:item="pos">
                                                <tr key={pos.Id}>
                                                    <td>{pos.Customer_Name__c}</td>
                                                    <td>{pos.Phone_Number__c}</td>
                                                    <td>
                                                        <lightning-button-icon icon-name="utility:link" alternative-text="Merge to Golden Record" title="Merge to Golden Record" onclick={handleOpenMergeModal} data-id={pos.Id} data-type="POS"></lightning-button-icon>
                                                    </td>
                                                </tr>
                                            </template>
                                        </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </lightning-tab>
            </lightning-tabset>
        </div>
        
        <!-- MERGE MODAL -->
        <template if:true={isMergeModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseMergeModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Select Target Golden Record</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="min-height: 250px; overflow: visible;">
                        <lightning-record-picker
                            label="Target Golden Record"
                            placeholder="Search by Name..."
                            object-api-name="Unified_Individual__c"
                            value={selectedGoldenRecordId}
                            onchange={handleGoldenRecordChange}
                            display-info={pickerDisplayInfo}
                            matching-info={pickerMatchingInfo}>
                        </lightning-record-picker>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button label="Cancel" variant="neutral" onclick={handleCloseMergeModal} class="slds-m-right_small"></lightning-button>
                        <lightning-button label="Merge" variant="brand" onclick={handleExecuteMerge} disabled={isMergeDisabled}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        
        <!-- D3 GRAPH MODAL -->
        <template if:true={isGraphModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open slds-modal_large">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={handleCloseGraph}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small" class="slds-icon-text-inverse"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium">Golden Record Lineage</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="position: relative; height: 500px; background-color: #fcfcfc;">
                        <template if:true={isGraphLoading}>
                            <lightning-spinner alternative-text="Loading Graph" size="medium"></lightning-spinner>
                        </template>
                        <div class="d3-container" lwc:dom="manual" style="width: 100%; height: 100%;"></div>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
        
        <!-- AI INSIGHTS MODAL -->
        <template if:true={isAIModalOpen}>
            <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header" style="background-color: #f4f6f9;">
                        <button class="slds-button slds-button_icon slds-modal__close" title="Close" onclick={handleCloseAIModal}>
                            <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                        </button>
                        <h2 class="slds-text-heading_medium" style="color: #0176d3; font-weight: bold;">
                            <lightning-icon icon-name="utility:magicwand" size="small" class="slds-m-right_x-small"></lightning-icon>
                            Agentforce Customer 360 Insights
                        </h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium" style="min-height: 200px;">
                        <template if:true={isAILoading}>
                            <div class="slds-text-align_center slds-p-around_large">
                                <lightning-spinner alternative-text="Agentforce is analyzing..." size="medium"></lightning-spinner>
                                <p class="slds-m-top_medium" style="font-style: italic;">Agentforce is analyzing cross-cloud data...</p>
                            </div>
                        </template>
                        <template if:false={isAILoading}>
                            <div class="slds-box slds-theme_default" style="border-left: 4px solid #0176d3; font-size: 14px; line-height: 1.6;">
                                <lightning-formatted-rich-text value={aiSummaryText}></lightning-formatted-rich-text>
                            </div>
                        </template>
                    </div>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </lightning-card>
</template>
